[accessibility]
ui_scale = 1.0
high_contrast = false

[shell]
corner_radius_scale = 0
font_family = "JetBrainsMono Nerd Font"
time_format = "{:%H:%M}"
date_format = "%A, %x"
clipboard_enabled = true
clipboard_history_max_entries = 100
polkit_agent = true
shared_gl_context = true

[shell.panel]
transparency_mode = "glass"
borders = true
shadow = true
launcher_placement = "centered"
clipboard_placement = "centered"
control_center_placement = "attached"

[shell.animation]
enabled = true
speed = 1.0

[shell.shadow]
direction = "down"
alpha = 0.55

[theme]
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-tonal-spot"
pure_black_dark = false

[theme.templates]
enable_builtin_templates = true
builtin_ids = []
enable_community_templates = true
community_ids = ["firefox", "kitty"]

[wallpaper]
enabled = true
fill_mode = "crop"
transition = ["fade"]
transition_duration = 1500
edge_smoothness = 0.3
transition_on_startup = false
directory = "~/Pictures/Wallpapers"

[wallpaper.automation]
enabled = true
interval_minutes = 30
order = "random"
recursive = true

[bar.main]
position = "top"
thickness = 34
background_opacity = 0.88
radius = 0
margin_h = 180
margin_v = 6
padding = 14
widget_spacing = 6
scale = 1.0
shadow = true
auto_hide = false
reserve_space = true
capsule = false

start = ["launcher", "workspaces"]
center = ["clock"]
end = ["media", "tray", "notifications", "clipboard", "volume", "control-center", "session"]

[notification]
enable_daemon = true
show_app_name = true
show_actions = true
layer = "top"
scale = 1.0
background_opacity = 0.92
offset_x = 20
offset_y = 8

[osd]
position = "top_right"
orientation = "horizontal"
scale = 1.0
background_opacity = 0.92
offset_x = 20
offset_y = 8

[osd.kinds]
volume = true
brightness = true
dnd = true
lock_keys = true

[lockscreen]
enabled = true
blurred_desktop = true
blur_intensity = 0.5
tint_intensity = 0.3

[backdrop]
enabled = true
blur_intensity = 0.4
tint_intensity = 0.2

[system.monitor]
enabled = true
cpu_poll_seconds = 2.0
gpu_poll_seconds = 5.0
memory_poll_seconds = 2.0
network_poll_seconds = 3.0

[weather]
enabled = false

[audio]
enable_overdrive = false
enable_sounds = false

[brightness]
enable_ddcutil = false

[nightlight]
enabled = false

[hooks]
wallpaper_changed = "ln -sf \"$NOCTALIA_WALLPAPER_PATH\" /home/necro/.cache/current-stylix-wallpaper"
