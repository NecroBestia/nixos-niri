[accessibility]
ui_scale = 1.0
high_contrast = false

[shell]
corner_radius_scale = 0
font_family = "JetBrainsMono Nerd Font"
time_format = "{:%I:%M %p}"
date_format = "%A, %x"
clipboard_enabled = true
clipboard_history_max_entries = 100
polkit_agent = true
shared_gl_context = true
niri_overview_type_to_launch_enabled = true

[shell.panel]
transparency_mode = "glass"
borders = true
shadow = true
control_center_placement = "attached"

[shell.animation]
enabled = true
speed = 1.0

[shell.launcher]
categories = false
compact = true

[shell.shadow]
direction = "down"
alpha = 0.55

[theme]
mode = "dark"
source = "wallpaper"
wallpaper_scheme = "m3-tonal-spot"
pure_black_dark = true

[theme.templates]
enable_builtin_templates = true
builtin_ids = ["gtk3", "gtk4", "niri", "qt", "starship"]
enable_community_templates = true
community_ids = ["obsidian", "vscode", "opencode", "papirus-icons", "zathura"]

[wallpaper]
enabled = true
fill_mode = "crop"
transition = ["fade"]
transition_duration = 1500
edge_smoothness = 0.3
transition_on_startup = false
directory = "~/Pictures/Wallpapers"

[wallpaper.automation]
enabled = true
interval_seconds = 1800
order = "random"
recursive = true

[bar.main]
position = "top"
thickness = 34
background_opacity = 0.6
radius = 0
margin_ends = 180
margin_edge = 6
padding = 14
widget_spacing = 6
scale = 1.0
shadow = true
auto_hide = false
reserve_space = true
capsule = false

start = ["workspaces", "spacer_2", "tray"]
end = ["media", "spacer_2", "group:g1", "spacer_2", "control-center", "session"]

[[bar.main.capsule_group]]
enabled = true
fill = "surface_variant"
id = "g1"
members = ["notifications", "clipboard", "volume"]
opacity = 1.0
padding = 6.0

[notification]
enable_daemon = true
show_app_name = true
show_actions = true
layer = "top"
scale = 1.0
background_opacity = 0.7
offset_x = 20
offset_y = 8

[osd]
position = "top_right"
orientation = "horizontal"
scale = 1.0
background_opacity = 0.7
offset_x = 20
offset_y = 8

[osd.kinds]
volume = true
brightness = true
dnd = true
lock_keys = true
power_profile = false

[lockscreen]
enabled = true
blurred_desktop = true
blur_intensity = 0.5
tint_intensity = 0.3

[lockscreen_widgets]
enabled = true

[backdrop]
enabled = true
blur_intensity = 0.4
tint_intensity = 0.2

[system.monitor]
enabled = true
cpu_poll_seconds = 2.0
gpu_poll_seconds = 5.0
memory_poll_seconds = 2.0
network_poll_seconds = 3.0

[weather]
enabled = true

[audio]
enable_overdrive = false
enable_sounds = false

[brightness]
enable_ddcutil = true

[nightlight]
enabled = true
temperature_day = 6500
temperature_night = 3500

[location]
auto_locate = true
custom_schedule = true
sunrise = "07:00"
sunset = "22:00"

[widget.media]
album_art_only = true
art_size = 22

[widget.clock]
format = "{:%I:%M %p}"

[widget.spacer_2]
type = "spacer"

[control_center]
hidden_tabs = ["power"]

[control_center.calendar]
show_events_card = false

[[control_center.shortcuts]]
type = "wifi"

[[control_center.shortcuts]]
type = "bluetooth"

[[control_center.shortcuts]]
type = "caffeine"

[[control_center.shortcuts]]
type = "nightlight"

[[control_center.shortcuts]]
type = "notification"

[[control_center.shortcuts]]
type = "clipboard"

[idle]
behavior_order = ["lock", "screen-off", "lock-and-suspend"]

[idle.behavior.lock]
action = "lock"
enabled = false
timeout = 600.0

[idle.behavior.lock-and-suspend]
action = "lock_and_suspend"
enabled = true
timeout = 900.0

[idle.behavior.screen-off]
action = "screen_off"
enabled = false
timeout = 660.0

[theme.templates.user.kitty]
input_path = "templates/kitty.conf"
output_path = "$XDG_CONFIG_HOME/kitty/current-theme.conf"
post_hook = "kill -SIGUSR1 $(pidof kitty 2>/dev/null)"

[theme.templates.user.nvim-base16]
input_path = "templates/nvim-base16.lua"
output_path = "$XDG_CONFIG_HOME/nvim/lua/noctalia.lua"
post_hook = "pkill -SIGUSR1 nvim"

[hooks]
wallpaper_changed = "ln -sf \"$NOCTALIA_WALLPAPER_PATH\" /home/necro/.cache/current-stylix-wallpaper; noctalia msg templates-apply; pkill -SIGUSR1 nvim; niri msg action load-config-file"
